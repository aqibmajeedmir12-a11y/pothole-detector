version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://backend:5001
      - HEADLESS=true
      - MODEL_PATH=best.pt
    env_file:
      - ./backend/.env
    depends_on:
      - backend
    restart: unless-stopped
